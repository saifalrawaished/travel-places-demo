<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#061938" />
  <title>Travel Places Demo</title>
  <style>
    :root {
      --bg: #061938;
      --surface: rgba(9, 30, 75, 0.82);
      --surface-strong: #0f2f6f;
      --text: #f7fbff;
      --muted: #bfd0f2;
      --line: rgba(195, 214, 255, 0.34);
      --line-strong: rgba(210, 224, 255, 0.5);
      --shadow: 0 18px 40px rgba(2, 7, 22, 0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --accent: #4a84f4;
      --chip: rgba(186, 206, 255, 0.2);
      --chip-active: #4a84f4;
      --chip-active-text: #ffffff;
      --title-text: #ffffff;
    }

    :root[data-theme="light"] {
      --bg: #eceef3;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-strong: #ffffff;
      --text: #0b2f74;
      --muted: #5f7198;
      --line: rgba(11, 47, 116, 0.14);
      --line-strong: rgba(11, 47, 116, 0.24);
      --shadow: 0 14px 34px rgba(11, 47, 116, 0.12);
      --accent: #0b2f74;
      --chip: rgba(11, 47, 116, 0.08);
      --chip-active: #0b2f74;
      --title-text: #0b2f74;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      width: 100%;
      max-width: 430px;
      min-height: 100svh;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(94, 136, 234, 0.24), rgba(6, 25, 56, 0) 42%),
        linear-gradient(180deg, #08204a 0%, #061938 100%);
      overflow: hidden;
    }

    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(94, 136, 234, 0.28), rgba(6, 25, 56, 0) 42%),
        linear-gradient(180deg, #08204a 0%, #061938 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.4s ease, visibility 0s linear 0.4s;
    }

    .splash-screen.is-hiding {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo {
      width: min(44vw, 168px);
      height: auto;
      display: block;
      animation: splashLogoIn 0.55s ease both;
    }

    @keyframes splashLogoIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: calc(var(--safe-top) + 18px) 18px calc(var(--safe-bottom) + 94px);
      animation: fadeIn 0.22s ease;
    }

    .screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chrome {
      position: sticky;
      top: calc(-1 * var(--safe-top) - 18px);
      z-index: 20;
      padding-top: calc(var(--safe-top) + 18px);
      margin: calc(-1 * var(--safe-top) - 18px) -18px 12px;
      padding-inline: 18px;
      background: linear-gradient(180deg, rgba(6, 25, 56, 0.96) 0%, rgba(6, 25, 56, 0.84) 72%, rgba(6, 25, 56, 0) 100%);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      position: relative;
      margin-bottom: 12px;
    }

    .page-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .back-button {
      position: absolute;
      inset-inline-start: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(14, 45, 102, 0.76);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(1, 8, 24, 0.5);
    }

    .back-button span:last-child {
      font-size: 14px;
      font-weight: 600;
    }

    html[dir="rtl"] .back-button {
      flex-direction: row-reverse;
    }

    .hero {
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1.02;
      letter-spacing: -0.04em;
      font-weight: 800;
      color: var(--title-text);
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: var(--muted);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(13, 42, 96, 0.84);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 10px 24px rgba(2, 8, 24, 0.46);
      margin-bottom: 16px;
    }

    .search svg {
      width: 18px;
      height: 18px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .search input {
      border: 0;
      outline: 0;
      width: 100%;
      background: transparent;
      color: var(--text);
      font-size: 15px;
    }

    .search input::placeholder {
      color: #c0cff0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card-button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      border-radius: var(--radius-lg);
      padding: 14px;
      text-align: start;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .card-button:active {
      transform: scale(0.985);
      box-shadow: 0 8px 18px rgba(1, 8, 24, 0.5);
    }

    .region-card {
      min-height: 202px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .country-card {
      min-height: 198px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(180deg, color-mix(in srgb, var(--tint, #1b3f84) 76%, #0a2353 24%), rgba(8, 31, 72, 0.94));
    }

    .image-wrap {
      height: 132px;
      border-radius: 18px;
      background: rgba(203, 220, 255, 0.14);
      border: 1px solid rgba(203, 220, 255, 0.34);
      display: grid;
      place-items: center;
      padding: 14px;
      overflow: hidden;
      position: relative;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-title {
      margin-top: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--title-text);
    }

    .card-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .pill {
      position: absolute;
      top: 12px;
      inset-inline-end: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(74, 132, 244, 0.96);
      color: #ffffff;
      padding: 7px 9px;
      border-radius: 999px;
    }

    .section-panel {
      border: 1px solid var(--line);
      background: rgba(12, 38, 87, 0.86);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 22px 18px;
    }

    .section-panel h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .section-panel p {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      padding-bottom: 2px;
      margin-bottom: 12px;
    }

    .tab-button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      white-space: nowrap;
      flex: 0 0 auto;
      scroll-snap-align: start;
    }

    .tab-button.active {
      background: var(--chip-active);
      color: var(--chip-active-text);
      border-color: transparent;
    }

    .filter-row-label {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .subcategory-filters {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      padding-bottom: 2px;
      margin: 0 0 16px;
    }

    .subfilter-button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      white-space: nowrap;
      flex: 0 0 auto;
      scroll-snap-align: start;
    }

    .subfilter-button.active {
      background: var(--chip-active);
      color: var(--chip-active-text);
      border-color: transparent;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .place-card {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(12, 38, 87, 0.86);
      border-radius: 22px;
      padding: 14px;
      text-align: start;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .place-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .place-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(203, 220, 255, 0.34);
      background: rgba(203, 220, 255, 0.14);
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .place-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .place-meta {
      min-width: 0;
      flex: 1;
    }

    .place-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      color: var(--title-text);
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .stars {
      letter-spacing: 0.08em;
      color: var(--title-text);
      font-size: 12px;
    }

    .place-chevron {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
    }

    .place-preview-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .place-preview-thumb {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(203, 220, 255, 0.34);
      background: rgba(203, 220, 255, 0.14);
      aspect-ratio: 1 / 1;
    }

    .place-preview-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-card {
      border: 1px solid var(--line);
      background: rgba(12, 38, 87, 0.9);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 18px;
      margin-bottom: 16px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .detail-logo {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      border: 1px solid rgba(203, 220, 255, 0.34);
      background: rgba(203, 220, 255, 0.14);
      display: grid;
      place-items: center;
      padding: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .detail-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .detail-title {
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 800;
      margin: 0 0 6px;
      color: var(--title-text);
    }

    .detail-copy {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 0 16px;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: #4a84f4;
      color: #ffffff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    .section-heading {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }

    #details-content section + section {
      margin-top: 20px;
    }

    .media-groups,
    .location-groups {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .media-group,
    .location-card {
      border: 1px solid var(--line);
      background: rgba(12, 38, 87, 0.86);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .media-group-title,
    .location-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .location-meta {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .media-subheading {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .gallery {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      gap: 10px;
      margin-top: 14px;
      margin-bottom: 14px;
      padding-bottom: 4px;
    }

    .gallery-card {
      flex: 0 0 min(78vw, 320px);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(203, 220, 255, 0.34);
      background: rgba(203, 220, 255, 0.14);
      aspect-ratio: 1 / 1;
      scroll-snap-align: start;
    }

    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .video-card {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(203, 220, 255, 0.34);
      background: rgba(203, 220, 255, 0.14);
      aspect-ratio: 1 / 1;
    }

    .video-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-note {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .mini-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--muted);
    }

    .maps-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(203, 220, 255, 0.2);
      font-weight: 700;
      color: var(--text);
    }

    .floating-actions {
      position: fixed;
      inset-inline-end: 18px;
      bottom: calc(var(--safe-bottom) + 18px);
      z-index: 40;
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .floating-action {
      position: static;
      border: 1px solid var(--line);
      background: rgba(74, 132, 244, 0.96);
      color: #ffffff;
      border-radius: 999px;
      padding: 13px 16px;
      min-width: 64px;
      box-shadow: 0 16px 34px rgba(2, 8, 24, 0.55);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .floating-action#theme-toggle {
      min-width: 78px;
    }

    .floating-action#language-toggle {
      min-width: 64px;
    }

    :root[data-theme="light"] .app-shell {
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.9), rgba(236, 238, 243, 0) 40%),
        linear-gradient(180deg, #f4f6fb 0%, #e8edf7 100%);
    }

    :root[data-theme="light"] .splash-screen {
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.92), rgba(236, 238, 243, 0) 42%),
        linear-gradient(180deg, #f4f6fb 0%, #e8edf7 100%);
    }

    :root[data-theme="light"] .chrome {
      background: linear-gradient(180deg, rgba(236, 238, 243, 0.96) 0%, rgba(236, 238, 243, 0.88) 72%, rgba(236, 238, 243, 0) 100%);
    }

    :root[data-theme="light"] .back-button {
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 6px 18px rgba(11, 47, 116, 0.12);
    }

    :root[data-theme="light"] .search {
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 10px 24px rgba(11, 47, 116, 0.1);
    }

    :root[data-theme="light"] .search input::placeholder {
      color: #7a89a8;
    }

    :root[data-theme="light"] .country-card {
      background: var(--surface);
    }

    :root[data-theme="light"] .image-wrap,
    :root[data-theme="light"] .place-logo,
    :root[data-theme="light"] .place-preview-thumb,
    :root[data-theme="light"] .detail-logo,
    :root[data-theme="light"] .gallery-card,
    :root[data-theme="light"] .video-card {
      background: rgba(11, 47, 116, 0.04);
      border-color: rgba(11, 47, 116, 0.1);
    }

    :root[data-theme="light"] .image-wrap {
      border-color: rgba(11, 47, 116, 0.08);
    }

    :root[data-theme="light"] .pill {
      background: rgba(11, 47, 116, 0.92);
    }

    :root[data-theme="light"] .section-panel,
    :root[data-theme="light"] .place-card,
    :root[data-theme="light"] .media-group,
    :root[data-theme="light"] .location-card {
      background: rgba(255, 255, 255, 0.84);
    }

    :root[data-theme="light"] .detail-card {
      background: rgba(255, 255, 255, 0.88);
    }

    :root[data-theme="light"] .maps-link {
      background: rgba(11, 47, 116, 0.05);
    }

    :root[data-theme="light"] .link-button {
      background: #0b2f74;
    }

    :root[data-theme="light"] .floating-action {
      background: rgba(11, 47, 116, 0.94);
      box-shadow: 0 16px 34px rgba(11, 47, 116, 0.24);
    }

    :root[data-theme="light"] .empty-state {
      background: rgba(255, 255, 255, 0.62);
    }

    .empty-state {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius-xl);
      padding: 26px 18px;
      text-align: center;
      background: rgba(12, 38, 87, 0.75);
    }

    .empty-state h3 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .empty-state p {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted);
    }

    .muted-note {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      margin-top: 14px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 360px) {
      .hero h1 {
        font-size: 28px;
      }

      .grid {
        gap: 12px;
      }

      .region-card,
      .country-card {
        min-height: 186px;
      }

      .image-wrap {
        height: 118px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .splash-screen {
        transition: none;
      }

      .splash-logo {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="splash-screen" class="splash-screen" aria-label="Tripora splash screen">
    <img class="splash-logo" src="assets/brand/logo.png" alt="Tripora logo" />
  </div>

  <div class="app-shell">

            logo: "assets/places/hotel/the_regency_hotel_kuwait/the_regency_hotel_kuwait_logo.png",
            rating: 4.6,

            descriptionAr: "فندق الريجنسي الكويت هو فندق خمس نجوم على الخليج العربي، ويشتهر بغرفه الأنيقة، ضيافته الكلاسيكية، ومرافقه ذات الطابع المنتجعي ضمن أجواء ساحلية هادئة. يقدم الفندق تجربة راقية داخل الكويت تجمع بين الإطلالة البحرية، الغرف والأجنحة الواسعة، المساحات الخارجية، المسابح، خيارات الطعام، وقاعات المناسبات، مما يجعله مناسباً للإقامات الترفيهية، الزيارات العائلية، حفلات الزفاف، والمناسبات الخاصة. يمنح موقعه على الخليج الضيوف تجربة أكثر هدوءاً من فنادق وسط المدينة، مع بقائهم قريبين من المناطق الرئيسية في الكويت. وبفضل مزيجه من الأناقة التقليدية، الإطلالات البحرية، والخدمة المصقولة، يُعد الريجنسي خياراً مميزاً لمن يبحث عن إقامة فاخرة ومريحة بطابع ساحلي واضح.",
            website: "https://www.regency.com.kw/",
            locations: [
              {
                id: "the_regency_hotel_kuwait-main",
                name: "The Regency Hotel Kuwait, Kuwait",
                nameAr: "فندق الريجنسي الكويت، الكويت",
                rating: 4.6,
                maps: "https://www.google.com/maps/search/?api=1&query=The+Regency+Kuwait",
                images: ["assets/places/hotel/the_regency_hotel_kuwait/the_regency_hotel_kuwait_1.png", "assets/places/hotel/the_regency_hotel_kuwait/the_regency_hotel_kuwait_2.png", "assets/places/hotel/the_regency_hotel_kuwait/the_regency_hotel_kuwait_3.png", "assets/places/hotel/the_regency_hotel_kuwait/the_regency_hotel_kuwait_4.png"]
              }
            ]
          }
        ]
      }
    };

    const screens = {
      regions: document.getElementById('screen-regions'),
      countries: document.getElementById('screen-countries'),
      places: document.getElementById('screen-places'),
      details: document.getElementById('screen-details')
    };

    const CATEGORY_TABS = [
      { id: 'tourist_attraction', labelKey: 'touristAttraction' },
      { id: 'restaurant', labelKey: 'restaurant' },
      { id: 'cafe', labelKey: 'cafe' },
      { id: 'service', labelKey: 'service' },
      { id: 'activity', labelKey: 'activity' },
      { id: 'hotel', labelKey: 'hotel' }
    ];

    const LOCKED_SUBCATEGORIES = {
      tourist_attraction: [
        { id: 'malls', labelKey: 'malls', placeIds: ['the_avenues', '360_mall'] },
        { id: 'parks', labelKey: 'parks', placeIds: ['al_shaheed_park'] },
        { id: 'heritage_sites', labelKey: 'heritageSites', placeIds: ['souq_al_mubarakiya'] },
        { id: 'outdoor_places', labelKey: 'outdoorPlaces', placeIds: ['murouj'] }
      ],
      restaurant: [
        { id: 'japanese_restaurants', labelKey: 'japaneseRestaurants', placeIds: ['white_robata', 'roka_kuwait', 'amimoto'] },
        { id: 'steakhouse_premium_beef', labelKey: 'steakhousePremiumBeef', placeIds: ['beefbar_kuwait'] },
        { id: 'breakfast_desserts', labelKey: 'breakfastDesserts', placeIds: ['cocoa_room'] }
      ]
    };

    const state = {
      language: 'en',
      theme: 'dark',
      screen: 'regions',
      selectedRegion: null,
      selectedCountry: null,
      selectedCategory: CATEGORY_TABS[0].id,
      selectedSubcategories: {},
      selectedPlaceId: null,
      regionSearch: '',
      countrySearch: '',
      placeSearch: ''
    };

    const regionSearchInput = document.getElementById('region-search');
    const countrySearchInput = document.getElementById('country-search');
    const placeSearchInput = document.getElementById('place-search');
    const themeToggle = document.getElementById('theme-toggle');
    const languageToggle = document.getElementById('language-toggle');
    const splashScreen = document.getElementById('splash-screen');
    const themeColorMeta = document.querySelector('meta[name="theme-color"]');
    const THEME_STORAGE_KEY = 'tripora-theme';
    const LANGUAGE_STORAGE_KEY = 'tripora-language';

    function t(key) {
      return translations[state.language][key] ?? key;
    }

    function getLabel(item) {
      return state.language === 'ar' && item?.nameAr ? item.nameAr : item?.name || '';
    }

    function getDescription(item) {
      return state.language === 'ar' && item?.descriptionAr ? item.descriptionAr : item?.description || '';
    }

    function stars(rating) {
      const full = Math.max(0, Math.min(5, Math.round(rating)));
      return '★'.repeat(full) + '☆'.repeat(5 - full);
    }

    function seededRating(seed) {
      let hash = 0;
      for (let i = 0; i < seed.length; i += 1) {
        hash = (hash * 31 + seed.charCodeAt(i)) >>> 0;
      }
      const value = 4.1 + (hash % 9) * 0.1;
      return Number(value.toFixed(1));
    }

    function normalizeDemoRatings() {
      Object.values(placesByCountry).forEach((countryPlaces) => {
        Object.values(countryPlaces).forEach((places) => {
          places.forEach((place) => {
            if (typeof place.rating !== 'number' || place.rating === 4.6) {
              place.rating = seededRating(place.id || place.name || 'place');
            }
            if (!Array.isArray(place.locations)) return;
            place.locations.forEach((location) => {
              if (typeof location.rating !== 'number' || location.rating === 4.6) {
                location.rating = seededRating(location.id || `${place.id}-location`);
              }
            });
          });
        });
      });
    }

    function matchesQuery(query, values) {
      const q = query.trim().toLowerCase();
      if (!q) return true;
      return values.some((value) => String(value || '').toLowerCase().includes(q));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function imageTag(src, alt) {
      return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" loading="lazy" />`;
    }

    function applyTheme(theme) {
      const nextTheme = theme === 'light' ? 'light' : 'dark';
      state.theme = nextTheme;
      document.documentElement.dataset.theme = nextTheme;
      if (themeColorMeta) {
        themeColorMeta.setAttribute('content', nextTheme === 'light' ? '#eceef3' : '#061938');
      }
      if (themeToggle) {
        themeToggle.textContent = nextTheme === 'dark' ? 'Light' : 'Dark';
      }
    }

    function setScreen(screenName) {
      state.screen = screenName;
      Object.entries(screens).forEach(([key, screen]) => {
        screen.classList.toggle('active', key === screenName);
      });
      window.scrollTo(0, 0);
      const activeScreen = screens[screenName];
      if (activeScreen) activeScreen.scrollTop = 0;
      render();
    }

    function openRegion(regionId) {
      state.selectedRegion = regionId;
      state.countrySearch = '';
      countrySearchInput.value = '';
      setScreen('countries');
    }

    function openCountry(countryId) {
      state.selectedCountry = countryId;
      state.selectedCategory = CATEGORY_TABS[0].id;
      state.selectedSubcategories = {};
      state.placeSearch = '';
      placeSearchInput.value = '';
      setScreen('places');
    }

    function openPlace(placeId) {
      state.selectedPlaceId = placeId;
      setScreen('details');
    }

    function goBack() {
      if (state.screen === 'countries') {
        setScreen('regions');
      } else if (state.screen === 'places') {
        setScreen('countries');
      } else if (state.screen === 'details') {
        setScreen('places');
      }
    }

    function getSelectedRegion() {
      return regions.find((region) => region.id === state.selectedRegion) || null;
    }

    function getSelectedCountry() {
      const regionCountries = countriesByRegion[state.selectedRegion] || [];
      return regionCountries.find((country) => country.id === state.selectedCountry) || null;
    }

    function getCurrentPlaces() {
      if (!state.selectedCountry || !placesByCountry[state.selectedCountry]) return [];
      return placesByCountry[state.selectedCountry][state.selectedCategory] || [];
    }

    function getSubcategoryConfig(categoryId) {
      return LOCKED_SUBCATEGORIES[categoryId] || null;
    }

    function getSelectedSubcategoryIds(categoryId) {
      return state.selectedSubcategories[categoryId] || [];
    }

    function filterPlacesByLockedSubcategories(places, categoryId) {
      const config = getSubcategoryConfig(categoryId);
      if (!config) return places;
      const selectedIds = getSelectedSubcategoryIds(categoryId);
      if (!selectedIds.length) return places;
      const allowed = new Set(
        config
          .filter((item) => selectedIds.includes(item.id))
          .flatMap((item) => item.placeIds)
      );
      return places.filter((place) => allowed.has(place.id));
    }

    function getSelectedPlace() {
      return CATEGORY_TABS.map((tab) => tab.id)
        .flatMap((key) => (placesByCountry[state.selectedCountry]?.[key] || []))
        .find((place) => place.id === state.selectedPlaceId) || null;
    }

    function getPlacePreviewImages(place, limit = 3) {
      return (place?.locations || [])
        .flatMap((location) => location.images || [])
        .slice(0, limit);
    }

    function renderRegions() {
      document.getElementById('regions-page-label').textContent = t('appLabel');
      document.getElementById('regions-hero-title').textContent = t('regionsTitle');
      document.getElementById('regions-hero-copy').textContent = t('regionsCopy');
      regionSearchInput.placeholder = t('searchRegions');
      languageToggle.textContent = state.language === 'en' ? 'AR' : 'EN';

      const filtered = regions.filter((region) => matchesQuery(state.regionSearch, [region.name, region.nameAr]));
      const html = filtered.length
        ? filtered.map((region) => `
            <button class="card-button region-card" type="button" data-region-id="${region.id}">
              <div class="image-wrap">
                ${imageTag(region.image, getLabel(region))}
                ${region.active ? '' : `<span class="pill">${escapeHtml(t('comingSoon'))}</span>`}
              </div>
              <div>
                <div class="card-title">${escapeHtml(getLabel(region))}</div>
                <div class="card-subtitle">${escapeHtml(region.active ? t('countriesLabel') : t('comingSoon'))}</div>
              </div>
            </button>
          `).join('')
        : `
          <div class="section-panel">
            <h2>${escapeHtml(t('noResults'))}</h2>
            <p>${escapeHtml(t('noResultsCopy'))}</p>
          </div>
        `;

      document.getElementById('regions-grid').innerHTML = html;
    }

    function renderCountries() {
      const region = getSelectedRegion();
      document.getElementById('back-to-regions-text').textContent = t('back');
      document.getElementById('countries-page-label').textContent = t('countriesLabel');
      document.getElementById('countries-hero-title').textContent = region ? getLabel(region) : t('countriesLabel');
      document.getElementById('countries-hero-copy').textContent = region?.active ? t('countriesCopyActive') : t('countriesCopySoon');
      countrySearchInput.placeholder = t('searchCountries');

      const container = document.getElementById('countries-content');
      if (!region) {
        container.innerHTML = '';
        return;
      }

      if (!region.active) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>${escapeHtml(t('regionSoonTitle'))}</h3>
            <p>${escapeHtml(t('regionSoonCopy'))}</p>
            <div class="muted-note">${escapeHtml(t('demoNote'))}</div>
          </div>
        `;
        return;
      }

      const countries = (countriesByRegion[region.id] || []).filter((country) => matchesQuery(state.countrySearch, [country.name, country.nameAr]));
      container.innerHTML = countries.length
        ? `<div class="grid">${countries.map((country) => `
            <button class="card-button country-card" type="button" data-country-id="${country.id}" style="--tint:${country.tint};">
              <div class="image-wrap">
                ${imageTag(country.image, getLabel(country))}
                ${country.active ? '' : `<span class="pill">${escapeHtml(t('comingSoon'))}</span>`}
              </div>
              <div>
                <div class="card-title">${escapeHtml(getLabel(country))}</div>
                <div class="card-subtitle">${escapeHtml(country.active ? t('placesLabel') : t('comingSoon'))}</div>
              </div>
            </button>
          `).join('')}</div>`
        : `
          <div class="section-panel">
            <h2>${escapeHtml(t('noResults'))}</h2>
            <p>${escapeHtml(t('noResultsCopy'))}</p>
          </div>
        `;
    }

    function renderTabs() {
      const tabs = CATEGORY_TABS.map((tab) => ({
        id: tab.id,
        label: t(tab.labelKey)
      }));

      document.getElementById('category-tabs').innerHTML = tabs.map((tab) => `
        <button class="tab-button ${state.selectedCategory === tab.id ? 'active' : ''}" type="button" data-tab-id="${tab.id}">
          ${escapeHtml(tab.label)}
        </button>
      `).join('');
    }

    function renderSubcategoryFilters() {
      const container = document.getElementById('subcategory-filters');
      const config = getSubcategoryConfig(state.selectedCategory);
      if (!config) {
        container.innerHTML = '';
        return;
      }

      const selectedIds = getSelectedSubcategoryIds(state.selectedCategory);
      container.innerHTML = config.map((item) => `
        <button
          class="subfilter-button ${selectedIds.includes(item.id) ? 'active' : ''}"
          type="button"
          data-subcategory-category="${state.selectedCategory}"
          data-subcategory-id="${item.id}">
          ${escapeHtml(t(item.labelKey))}
        </button>
      `).join('');
    }

    function buildLabelList(items) {
      const separator = state.language === 'ar' ? '، ' : ', ';
      return items.join(separator);
    }

    function renderPlaces() {
      const country = getSelectedCountry();
      document.getElementById('back-to-countries-text').textContent = t('back');
      document.getElementById('places-page-label').textContent = t('placesLabel');
      document.getElementById('places-hero-title').textContent = country ? getLabel(country) : t('placesLabel');
      placeSearchInput.placeholder = t('searchPlaces');

      const tabs = document.getElementById('category-tabs');
      const mainCategoriesLabel = document.getElementById('main-categories-label');
      const subcategoriesLabel = document.getElementById('subcategories-label');
      const subcategoryFilters = document.getElementById('subcategory-filters');
      const container = document.getElementById('places-content');

      if (!country) {
        mainCategoriesLabel.textContent = '';
        subcategoriesLabel.textContent = '';
        mainCategoriesLabel.classList.add('hidden');
        subcategoriesLabel.classList.add('hidden');
        tabs.innerHTML = '';
        subcategoryFilters.innerHTML = '';
        container.innerHTML = '';
        return;
      }

      if (!country.active) {
        mainCategoriesLabel.textContent = '';
        subcategoriesLabel.textContent = '';
        mainCategoriesLabel.classList.add('hidden');
        subcategoriesLabel.classList.add('hidden');
        tabs.innerHTML = '';
        subcategoryFilters.innerHTML = '';
        document.getElementById('places-hero-copy').textContent = t('placesCopySoon');
        container.innerHTML = `
          <div class="empty-state">
            <h3>${escapeHtml(t('countrySoonTitle'))}</h3>
            <p>${escapeHtml(t('countrySoonCopy'))}</p>
            <div class="muted-note">${escapeHtml(t('demoNote'))}</div>
          </div>
        `;
        return;
      }

      document.getElementById('places-hero-copy').textContent = t('placesCopyActive');
      renderTabs();
      renderSubcategoryFilters();

      mainCategoriesLabel.textContent = `${t('placesSummaryLabel')}:`;
      mainCategoriesLabel.classList.remove('hidden');

      const subcategoryConfig = getSubcategoryConfig(state.selectedCategory);
      if (subcategoryConfig) {
        subcategoriesLabel.textContent = `${t('subcategoriesSummaryLabel')}:`;
        subcategoriesLabel.classList.remove('hidden');
      } else {
        subcategoriesLabel.textContent = '';
        subcategoriesLabel.classList.add('hidden');
      }

      const filtered = filterPlacesByLockedSubcategories(getCurrentPlaces(), state.selectedCategory).filter((place) =>
        matchesQuery(state.placeSearch, [place.name, place.nameAr, place.description, place.descriptionAr])
      );

      container.innerHTML = filtered.length
        ? `<div class="list">${filtered.map((place) => {
            const previewImages = getPlacePreviewImages(place, 3);
            return `
              <button class="place-card" type="button" data-place-id="${place.id}">
                <div class="place-top">
                  <div class="place-logo">${imageTag(place.logo, getLabel(place))}</div>
                  <div class="place-meta">
                    <div class="place-name">${escapeHtml(getLabel(place))}</div>
                    <div class="rating-row">
                      <span class="stars">${escapeHtml(stars(place.rating))}</span>
                      <span>${escapeHtml(place.rating.toFixed(1))} ${escapeHtml(t('starsOutOfFive'))}</span>
                    </div>
                  </div>
                  <div class="place-chevron">›</div>
                </div>
                ${previewImages.length
                  ? `<div class="place-preview-grid">
                      ${previewImages.map((image, index) => `
                        <div class="place-preview-thumb">
                          ${imageTag(image, `${getLabel(place)} ${index + 1}`)}
                        </div>
                      `).join('')}
                    </div>`
                  : ''
                }
              </button>
            `;
          }).join('')}</div>`
        : `
          <div class="section-panel">
            <h2>${escapeHtml(t('noResults'))}</h2>
            <p>${escapeHtml(t('noResultsCopy'))}</p>
          </div>
        `;
    }

    function renderDetails() {
      const place = getSelectedPlace();
      document.getElementById('back-to-places-text').textContent = t('back');
      document.getElementById('details-page-label').textContent = t('detailsLabel');

      const container = document.getElementById('details-content');
      if (!place) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = `
        <article class="detail-card">
          <div class="detail-header">
            <div class="detail-logo">${imageTag(place.logo, getLabel(place))}</div>
            <div>
              <h1 class="detail-title">${escapeHtml(getLabel(place))}</h1>
              <div class="rating-row">
                <span class="stars">${escapeHtml(stars(place.rating))}</span>
                <span>${escapeHtml(place.rating.toFixed(1))} ${escapeHtml(t('starsOutOfFive'))}</span>
              </div>
            </div>
          </div>
          <p class="detail-copy">${escapeHtml(getDescription(place))}</p>
          <a class="link-button" href="${escapeHtml(place.website)}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(t('officialWebsite'))}
          </a>
        </article>

        <section>
          <p class="section-heading">${escapeHtml(t('photosVideosTitle'))}</p>
          <div class="media-groups">
            ${place.locations.map((location) => {
              const videos = Array.isArray(location.videos) ? location.videos : [];
              return `
                <article class="media-group">
                  <div class="media-group-title">${escapeHtml(getLabel(location))}</div>
                  <div class="location-meta">${escapeHtml(t('rating'))}: ${escapeHtml(location.rating.toFixed(1))}</div>
                  <div class="gallery">
                    ${location.images.map((image, index) => `
                      <div class="gallery-card">
                        ${imageTag(image, `${getLabel(place)} ${index + 1}`)}
                      </div>
                    `).join('')}
                  </div>
                  <p class="media-subheading">${escapeHtml(t('videos'))}</p>
                  ${videos.length
                    ? `<div class="video-grid">
                        ${videos.map((video) => `
                          <div class="video-card">
                            <video controls preload="metadata" playsinline ${video.poster ? `poster="${escapeHtml(video.poster)}"` : ''}>
                              <source src="${escapeHtml(video.src || '')}" type="${escapeHtml(video.type || 'video/mp4')}" />
                            </video>
                          </div>
                        `).join('')}
                      </div>`
                    : `<div class="video-note">${escapeHtml(t('noVideosYet'))}</div>`
                  }
                </article>
              `;
            }).join('')}
          </div>
        </section>

        <section>
          <p class="section-heading">${escapeHtml(t('locationTitle'))}</p>
          <div class="location-groups">
            ${place.locations.map((location) => `
              <article class="location-card">
                <div class="location-title">${escapeHtml(getLabel(location))}</div>
                <div class="location-meta">${escapeHtml(t('rating'))}: ${escapeHtml(location.rating.toFixed(1))} ${escapeHtml(t('starsOutOfFive'))}</div>
                <div class="mini-row">
                  <span>${escapeHtml(t('openMaps'))}</span>
                  <a class="maps-link" href="${escapeHtml(location.maps)}" target="_blank" rel="noopener noreferrer">
                    ${escapeHtml(t('openMaps'))}
                  </a>
                </div>
              </article>
            `).join('')}
          </div>
        </section>
      `;
    }

    function render() {
      document.documentElement.lang = state.language;
      document.documentElement.dir = state.language === 'ar' ? 'rtl' : 'ltr';
      renderRegions();
      renderCountries();
      renderPlaces();
      renderDetails();
    }

    document.addEventListener('click', (event) => {
      const regionButton = event.target.closest('[data-region-id]');
      if (regionButton) {
        openRegion(regionButton.dataset.regionId);
        return;
      }

      const countryButton = event.target.closest('[data-country-id]');
      if (countryButton) {
        openCountry(countryButton.dataset.countryId);
        return;
      }

      const tabButton = event.target.closest('[data-tab-id]');
      if (tabButton) {
        state.selectedCategory = tabButton.dataset.tabId;
        state.placeSearch = '';
        placeSearchInput.value = '';
        renderPlaces();
        return;
      }

      const subcategoryButton = event.target.closest('[data-subcategory-id]');
      if (subcategoryButton) {
        const categoryId = subcategoryButton.dataset.subcategoryCategory;
        const subcategoryId = subcategoryButton.dataset.subcategoryId;
        const current = getSelectedSubcategoryIds(categoryId);
        const next = current.includes(subcategoryId)
          ? current.filter((id) => id !== subcategoryId)
          : [...current, subcategoryId];
        state.selectedSubcategories[categoryId] = next;
        renderPlaces();
        return;
      }

      const placeButton = event.target.closest('[data-place-id]');
      if (placeButton) {
        openPlace(placeButton.dataset.placeId);
        return;
      }

    });

    regionSearchInput.addEventListener('input', (event) => {
      state.regionSearch = event.target.value;
      renderRegions();
    });

    countrySearchInput.addEventListener('input', (event) => {
      state.countrySearch = event.target.value;
      renderCountries();
    });

    placeSearchInput.addEventListener('input', (event) => {
      state.placeSearch = event.target.value;
      renderPlaces();
    });

    document.getElementById('back-to-regions').addEventListener('click', goBack);
    document.getElementById('back-to-countries').addEventListener('click', goBack);
    document.getElementById('back-to-places').addEventListener('click', goBack);

    languageToggle.addEventListener('click', () => {
      state.language = state.language === 'en' ? 'ar' : 'en';
      window.localStorage.setItem(LANGUAGE_STORAGE_KEY, state.language);
      render();
    });

    themeToggle.addEventListener('click', () => {
      const nextTheme = state.theme === 'dark' ? 'light' : 'dark';
      applyTheme(nextTheme);
      window.localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
    });

    const savedTheme = window.localStorage.getItem(THEME_STORAGE_KEY);
    applyTheme(savedTheme === 'dark' ? 'dark' : 'light');

    const savedLanguage = window.localStorage.getItem(LANGUAGE_STORAGE_KEY);
    state.language = savedLanguage === 'en' ? 'en' : 'ar';

    normalizeDemoRatings();
    render();

    const splashDurationMs = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 400 : 2200;
    window.setTimeout(() => {
      if (!splashScreen) return;
      splashScreen.classList.add('is-hiding');
      window.setTimeout(() => {
        splashScreen.remove();
      }, 420);
    }, splashDurationMs);
